
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ঐক্যবদ্ধ বোচাগঞ্জ উপজেলা</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#006A4E,#003B2F,#8B0000);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
width:90%;
max-width:420px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
text-align:center;
box-shadow:0 0 40px rgba(255,215,0,.5);
animation:fadeIn 2s;
}

.logo{
width:140px;
height:140px;
margin:auto;
margin-bottom:20px;
border-radius:50%;
border:4px solid gold;
box-shadow:0 0 25px gold;
overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
font-size:40px;
color:#FFD700;
text-shadow:0 0 15px orange;
margin-bottom:15px;
}

h2{
font-size:24px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:.9;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 35px;
background:linear-gradient(45deg,#FFD700,#FF6A00);
border-radius:50px;
text-decoration:none;
color:white;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<h1>🎉 শুভ উদ্বোধন 🎉</h1>

<h2>ঐক্যবদ্ধ বোচাগঞ্জ উপজেলা</h2>

<p>ঐক্যে • উন্নয়ন • অগ্রগতি</p>

<a class="btn"
href="https://www.facebook.com/share/1k2RFmCug6/"
target="_blank">

🚀 সংগঠনে প্রবেশ করুন

</a>

</div>

</body>
</html>
